- id: '1771614779114'
  alias: Battery - targets, peak, export_Migrated2
  description: ''
  triggers:
  - entity_id: input_boolean.huawei_force_control
    to: 'on'
    trigger: state
  - entity_id:
    - sensor.batteries_state_of_capacity
    - binary_sensor.energy_cheap_now
    - binary_sensor.energy_expensive_now
    - binary_sensor.pv_excess_soon
    - switch.rugvaenget13_charging
    trigger: state
  - value_template: "{{ is_state('input_boolean.huawei_force_control','on')\n   and
      states('sensor.time') in ['00:00','06:00','09:00','11:00','13:00','15:00','16:00','17:00','21:00']
      }}\n"
    trigger: template
  conditions:
  - condition: state
    entity_id: input_boolean.huawei_force_control
    state: 'on'
  actions:
  - variables:
      vacation_mode: '{{ is_state(''input_boolean.vacation_mode'',''on'') }}'
      expensive_export_price: '{{ states(''input_number.expensive_export_price'')
        | float(0) }}'
      current_power_price_hr: '{{ state_attr(''sensor.energi_data_service'',''current_price'')
        | float(0) }}'
      soc: '{{ states(''sensor.batteries_state_of_capacity'') | float(0) }}'
      cheap_now: '{{ is_state(''binary_sensor.energy_cheap_now'',''on'') }}'
      expensive_now: '{{ is_state(''binary_sensor.energy_expensive_now'',''on'') }}'
      pv_good: '{{ is_state(''binary_sensor.pv_excess_soon'',''on'') }}'
      hour: '{{ now().hour }}'
      day_target: '{{ states(''input_number.target_soc_day'') | float(95) }}'
      night_target: '{{ states(''input_number.target_soc_night'') | float(10) }}'
      allow_export: '{{ is_state(''input_boolean.allow_export'',''on'') }}'
      export_min_soc: '{{ states(''input_number.export_min_soc'') | float(60) }}'
      ev_charging: >
        {{ is_state('switch.rugvaenget13_charging','on')
           or is_state('switch.monta_spangsberg_start_stop','on')
           or (states('sensor.zaptec_total_charge_power') | float(0) > 0.1) }}
      export_price: '{{ states(''sensor.energidataservice_export'') | float(0) }}'
      forecast_tomorrow: '{{ states(''sensor.solcast_pv_forecast_forecast_tomorrow'')
        | float(0) }}'
      forecast_today: '{{ states(''sensor.solcast_pv_forecast_forecast_today'') |
        float(0) }}'
      forecast_remaining_today: '{{ states(''sensor.solcast_pv_forecast_forecast_remaining_today'')
        | float(0) }}'
      house_consumption_power: '{{ states(''sensor.house_consumption_power'') | float(300) }}'
      dynamic_power: '{{ states(''sensor.inverter_pv_power'') | float(0) - states(''sensor.house_consumption_power'') | float(0) }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ soc < 60 and 15 <= hour <= 16 }}'
      sequence:
      - action: script.huawei_force_charge_to_target_soc_param_migrated
        data:
          target_soc: 60
          power: 5000
      - condition: state
        entity_id: input_boolean.energy_debug
        state: 'on'
      - action: logbook.log
        data:
          name: Energy Manager
          message: Emergency charge - charging to 60% for afternoon peak ({{ soc }}%)
    - conditions:
      - condition: template
        value_template: '{{ export_price < 0 and hour < 15 }}'
      sequence:
      - action: script.huawei_export_limit_w
        data:
          power: 0
      - action: script.set_battery_working_mode
        data:
          power: 0
      - condition: state
        entity_id: input_boolean.energy_debug
        state: 'on'
      - action: logbook.log
        data:
          name: Energy Manager
          message: Export blocked (negative export price).
    - conditions:
      - condition: template
        value_template: '{{ ev_charging and not ((forecast_remaining_today < 10 or
          hour == 16) and soc < day_target and 9 <= hour <= 17) }}'
      sequence:
      - action: script.huawei_export_limit_w
        data:
          power: 0
      - action: script.set_battery_working_mode
        data:
          power: 0
    - conditions:
      - condition: state
        entity_id: input_boolean.vacation_mode
        state: 'on'
      - condition: template
        value_template: '{{ vacation_mode and soc > 15 and export_price > expensive_export_price
          and hour >= 17 }}'
      sequence:
      - action: script.huawei_export_unlimited
        data: {}
      - action: script.huawei_force_discharge_to_soc
        data:
          target_soc: 15
      - action: script.set_battery_working_mode
        data:
          power: 100
    - conditions:
      - condition: template
        value_template: '{% set hours = state_attr(''sensor.billigste_4_timer_i_dag_unikke_timer'',''hours'')
          or [] %} {{ now().strftime(''%H'') in hours }}'
      sequence:
      - action: script.huawei_force_charge_to_target_soc_param_migrated
        data:
          target_soc: '{{ night_target | int }}'
          power: 5000
      - action: number.set_value
        data:
          value: '{{ ((house_consumption_power | float) * 1.5) | int }}'
        target:
          entity_id: number.batteries_maximum_discharging_power
    - conditions:
      - condition: template
        value_template: "{{ soc < 10\n   and forecast_tomorrow < 15\n   and cheap_now\n
          \  and hour >= 0\n   and hour < 6\n   and soc < night_target\n   and forecast_today
          <= 10 }}"
      sequence:
      - action: script.huawei_force_charge_to_target_soc_param_migrated
        data:
          target_soc: '{{ night_target | int }}'
          power: 5000
    - conditions:
      - condition: template
        value_template: "{{ soc < 10\n   and forecast_tomorrow < 15\n   and 13 <=
          hour <= 16\n   and soc < day_target }}"
      sequence:
      - action: script.huawei_force_charge_to_target_soc_param_migrated
        data:
          target_soc: '{{ day_target | int }}'
          power: 5000
    - conditions:
      - condition: template
        value_template: "{{ (forecast_remaining_today < 10 or hour == 16)\n   and
          soc < day_target\n   and 9 <= hour <= 17\n   and not ev_charging }}"
      sequence:
      - action: script.huawei_force_charge_to_target_soc_param_migrated
        data:
          target_soc: '{{ day_target | int }}'
          power: 5000
      - action: number.set_value
        data:
          value: '{{ ((house_consumption_power | float) * 1.5) | int }}'
        target:
          entity_id: number.batteries_maximum_discharging_power
    - conditions:
      - condition: template
        value_template: "{{ hour < 17\n   and soc >= day_target\n   and not ev_charging
          }}"
      sequence:
      - action: script.huawei_export_limit_w
        data:
          power: 0
      - action: script.set_battery_working_mode
        data:
          power: 0
      - action: number.set_value
        data:
          value: '{{ ((house_consumption_power | float) * 1.5) | int }}'
        target:
          entity_id: number.batteries_maximum_discharging_power
    - conditions:
      - condition: template
        value_template: "{{ hour >= 17\n   and export_price >= expensive_export_price\n
          \  and soc > 15\n   and not ev_charging }}"
      sequence:
      - action: script.huawei_export_unlimited
        data: {}
      - action: script.huawei_force_discharge_to_soc
        data:
          target_soc: 15
      - action: script.set_battery_working_mode
        data:
          power: 30
    - conditions:
      - condition: template
        value_template: "{{ allow_export\n   and expensive_now\n   and soc >= export_min_soc\n
          \  and not ev_charging\n   and hour >= 17 }}"
      sequence:
      - action: script.huawei_export_limit_w
        data:
          power: 0
      - action: script.set_battery_working_mode
        data:
          power: 0
    default:
    - action: script.set_battery_working_mode
      data:
        power: 0
    - action: number.set_value
      data:
        value: '5000'
      target:
        entity_id: number.batteries_maximum_discharging_power
  mode: restart
- id: '1000000000001'
  alias: Battery - Daily reset maximum discharging power
  description: Resets batteries_maximum_discharging_power to 5000 W every day at midnight
  triggers:
  - trigger: time
