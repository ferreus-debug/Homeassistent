- id: '1743004575647'
  alias: Start varmepumpe og poolpumpe efter betingelser (robust)
  description: 'Robust version: Starter pumper ved overskudsproduktion, manglende
    drift eller om natten.

    '
  triggers:
  - entity_id: sensor.inverter_pv_power
    id: overskud
    trigger: state
  - minutes: 0
    id: minimumsdrift
    trigger: time_pattern
  - at: 00:00:00
    id: natdrift
    trigger: time
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''overskud'' }}'
      - condition: template
        value_template: "{{ states('sensor.inverter_pv_power') not in ['unavailable',
          'unknown'] and\n   states('sensor.house_consumption_power') not in ['unavailable',
          'unknown'] }}\n"
      - condition: numeric_state
        entity_id: sensor.inverter_pv_power
        above: 1000
      - condition: template
        value_template: "{{ (states('sensor.inverter_pv_power') | float(0)) -\n   (states('sensor.house_consumption_power')
          | float(0)) > 1500 }}\n"
      - condition: state
        entity_id: switch.shellyplus1varmepumpe_switch_0
        state: 'off'
      - condition: state
        entity_id: switch.shellypoolplug_switch_0
        state: 'off'
      sequence:
      - target:
          entity_id:
          - switch.shellyplus1varmepumpe_switch_0
          - switch.shellypoolplug_switch_0
        action: switch.turn_on
      - target:
          entity_id: timer.poolpumpe_timer
        action: timer.cancel
      - target:
          entity_id: timer.poolpumpe_timer
        action: timer.start
      - data:
          name: Pumper
          message: Varmepumpe og poolpumpe blev startet pga. overskudsproduktion
          entity_id: switch.shellyplus1varmepumpe_switch_0
        action: logbook.log
      - delay: 00:30:00
      - target:
          entity_id:
          - switch.shellyplus1varmepumpe_switch_0
          - switch.shellypoolplug_switch_0
        action: switch.turn_off
      - target:
          entity_id: timer.poolpumpe_timer
        action: timer.pause
      - data:
          name: Pumper
          message: Varmepumpe og poolpumpe blev slukket efter 30 minutter
          entity_id: switch.shellyplus1varmepumpe_switch_0
        action: logbook.log
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''minimumsdrift'' }}'
      - condition: time
        after: '11:00:00'
      - condition: template
        value_template: '{{ (state_attr(''timer.poolpumpe_timer'', ''remaining'')
          | default(0) | as_timedelta).total_seconds() / 3600 < 6 }}

          '
      - condition: state
        entity_id: switch.shellyplus1varmepumpe_switch_0
        state: 'off'
      - condition: state
        entity_id: switch.shellypoolplug_switch_0
        state: 'off'
      sequence:
      - target:
          entity_id:
          - switch.shellyplus1varmepumpe_switch_0
          - switch.shellypoolplug_switch_0
        action: switch.turn_on
      - target:
          entity_id: timer.poolpumpe_timer
        action: timer.cancel
      - target:
          entity_id: timer.poolpumpe_timer
        action: timer.start
      - data:
          name: Minimumsdrift
          message: 'Varmepumpe og poolpumpe blev startet efter kl. 11 pga. < 6 timers
            drift

            '
          entity_id: switch.shellyplus1varmepumpe_switch_0
        action: logbook.log
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''natdrift'' }}'
      - condition: time
        after: 00:00:00
        before: 05:00:00
      - condition: state
        entity_id: switch.shellyplus1varmepumpe_switch_0
        state: 'off'
      - condition: state
        entity_id: switch.shellypoolplug_switch_0
        state: 'off'
      sequence:
      - target:
          entity_id:
          - switch.shellyplus1varmepumpe_switch_0
          - switch.shellypoolplug_switch_0
        action: switch.turn_on
      - target:
          entity_id: timer.poolpumpe_timer
        action: timer.cancel
      - target:
          entity_id: timer.poolpumpe_timer
        action: timer.start
      - data:
          name: Pumper
          message: Varmepumpe og poolpumpe blev startet mellem 00:00 og 05:00
          entity_id: switch.shellyplus1varmepumpe_switch_0
        action: logbook.log
      - delay: 00:30:00
      - target:
          entity_id:
          - switch.shellyplus1varmepumpe_switch_0
          - switch.shellypoolplug_switch_0
        action: switch.turn_off
      - target:
          entity_id: timer.poolpumpe_timer
        action: timer.pause
      - data:
          name: Pumper
          message: Varmepumpe og poolpumpe blev slukket efter 30 minutter
          entity_id: switch.shellyplus1varmepumpe_switch_0
        action: logbook.log
    default:
    - data:
        name: Scriptfejl
        message: Ingen betingelser opfyldt for pumperne
      action: logbook.log
  mode: restart
