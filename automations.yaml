- id: '1758624798706'
  alias: Battery - targets, peak, export_Migrated
  description: ''
  triggers:
  - entity_id: input_boolean.huawei_force_control
    to: 'on'
    trigger: state
  - entity_id:
    - sensor.batteries_state_of_capacity
    - binary_sensor.energy_cheap_now
    - binary_sensor.energy_expensive_now
    - binary_sensor.pv_excess_soon
    - switch.rugvaenget13_charging
    trigger: state
  - value_template: "{{ is_state('input_boolean.huawei_force_control','on')\n   and
      states('sensor.time') in ['00:00','06:00','09:00','11:00','13:00','15:00','16:00','17:00','21:00']
      }}\n"
    trigger: template
  conditions:
  - condition: state
    entity_id: input_boolean.huawei_force_control
    state: 'on'
  actions:
  - variables:
      vacation_mode: '{{ is_state(''input_boolean.vacation_mode'',''off'') }}'
      expensive_export_price: '{{states(''input_number.expensive_export_price'') |
        float(0)}}'
      current_power_price_hr: '{{state_attr(''sensor.energi_data_service'',''current_price'')|float(0)}}'
      soc: '{{ states(''sensor.batteries_state_of_capacity'')|float(0) }}'
      cheap_now: '{{ is_state(''binary_sensor.energy_cheap_now'',''on'') }}'
      expensive_now: '{{ is_state(''binary_sensor.energy_expensive_now'',''on'') }}'
      pv_good: '{{ is_state(''binary_sensor.pv_excess_soon'',''on'') }}'
      hour: '{{ now().hour }}'
      day_target: '{{ states(''input_number.target_soc_day'')|float(95) }}'
      night_target: '{{ states(''input_number.target_soc_night'')|float(10) }}'
      allow_export: '{{ is_state(''input_boolean.allow_export'',''on'') }}'
      export_min_soc: '{{ states(''input_number.export_min_soc'')|float(60) }}'
      ev_charging: '{{ is_state(''switch.rugvaenget13_charging'',''on'') }}'
      export_price: '{{ states(''sensor.energidataservice_export'')|float(0) }}'
      forecast_tomorrow: '{{states(''sensor.solcast_pv_forecast_forecast_tomorrow'')|float(0)
        }}'
      forecast_today: '{{states(''sensor.solcast_pv_forecast_forecast_today'')|float(0)
        }}'
      forecast_remaining_today: '{{states(''sensor.solcast_pv_forecast_forecast_remaining_today'')|float(0)
        }}'
      dynamic_power: "{{ states('sensor.inverter_pv_power') | float -\n   states('sensor.house_consumption_power')
        | float }}      \n"
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.vacation_mode
        state: 'on'
      - condition: template
        value_template: '{{ vacation_mode and soc > 5 and export_price > 0}}'
      sequence:
      - action: script.set_battery_working_mode
        metadata: {}
        data:
          power: 100
      - action: script.huawei_export_unlimited
        metadata: {}
        data: {}
    - conditions:
      - condition: template
        value_template: '{% set hours = state_attr(''sensor.billigste_4_timer_i_dag_unikke_timer'',''hours'')
          or [] %} {{ now().strftime(''%H'') in hours }}'
      sequence:
      - action: script.huawei_force_charge_to_target_soc_param_migrated
        data:
          target_soc: '{{ night_target | int }}'
          power: 5000
      - action: number.set_value
        metadata: {}
        data:
          value: '300'
        target:
          entity_id: number.batteries_maximum_discharging_power
    - conditions:
      - condition: template
        value_template: '{{ export_price > 0 and current_power_price_hr > expensive_export_price
          and soc > 15}}'
      sequence:
      - action: script.huawei_export_unlimited
        metadata: {}
        data: {}
      - action: script.set_battery_working_mode
        metadata: {}
        data:
          power: 30
    - conditions:
      - condition: template
        value_template: '{{ export_price < 0 and hour < 15 }}'
      sequence:
      - action: script.huawei_export_limit_w
        data:
          power: 0
      - action: script.set_battery_working_mode
        data:
          power: 0
      - condition: state
        entity_id: input_boolean.energy_debug
        state: 'on'
      - action: logbook.log
        data:
          name: Energy Manager
          message: Export blocked (negative export price).
    - conditions:
      - condition: template
        value_template: '{{ ev_charging }}'
      sequence:
      - action: script.huawei_export_limit_w
        data:
          power: 0
      - action: script.set_battery_working_mode
        data:
          power: 0
    - conditions:
      - condition: template
        value_template: "{{ soc < 10\n   and forecast_tomorrow < 15\n   and cheap_now\n
          \  and hour >= 0\n   and hour < 6\n   and soc < night_target\n   and forecast_today
          <= 10 }}"
      sequence:
      - action: script.huawei_force_charge_to_target_soc_param_migrated
        data:
          target_soc: '{{ night_target | int }}'
          power: 5000
    - conditions:
      - condition: template
        value_template: "{{ soc < 10\n   and forecast_tomorrow < 15\n   and 13 <=
          hour <= 16\n   and soc < day_target }}"
      sequence:
      - action: script.huawei_force_charge_to_target_soc_param_migrated
        data:
          target_soc: '{{ day_target | int }}'
          power: 5000
    - conditions:
      - condition: template
        value_template: '{{ 15 <= hour < 17 and not ev_charging and export_price >=
          0 and soc > day_target}}'
      sequence:
      - action: script.huawei_export_unlimited
        data: {}
      - action: script.huawei_force_discharge_to_soc
        data:
          target_soc: '{{ day_target | int }}'
      - action: script.set_battery_working_mode
        data:
          power: 10
    - conditions:
      - condition: template
        value_template: '{{ allow_export and expensive_now and soc >= export_min_soc
          and not ev_charging and pv_good and export_price >= 0 }}'
      sequence:
      - action: script.set_battery_working_mode
        data:
          power: 0
    default:
    - action: script.set_battery_working_mode
      data:
        power: 0
    - action: number.set_value
      metadata: {}
      data:
        value: '5000'
      target:
        entity_id: number.batteries_maximum_discharging_power
  mode: restart
- id: '1758631084115'
  alias: Battery - Morning opportunity export (06-10 if 11 remaining is high)_MIGRATED
  description: ''
  triggers:
  - minutes: /5
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: input_boolean.huawei_force_control
    state: 'on'
  - condition: state
    entity_id: input_boolean.morning_sell_enable
    state: 'on'
  - condition: state
    entity_id: input_boolean.allow_export
    state: 'on'
  - condition: time
    after: 06:00:00
    before: '11:00:00'
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ export_price >= 0\n   and pv_remaining >= pv_need\n   and
          (soc >= export_min_soc or pv_remaining >= pv_override_kwh)\n   and not ev_charging
          }}\n"
      sequence:
      - action: script.huawei_export_unlimited
        data: {}
      - action: script.huawei_force_discharge_to_soc
        data: {}
      - action: script.set_battery_working_mode
        data:
          power: 100
      - action: logbook.log
        data:
          name: Energy Manager
          message: "Morning export ACTIVE (reason: {{\n  'SOC>=min' if soc >= export_min_soc
            else\n  'PV>=%s kWh override'|format(pv_override_kwh)\n}}). Exporting down
            to {{ export_min_soc|int }}%. PV remaining {{ pv_remaining }} kWh (need
            >= {{ pv_need }} kWh), export price {{ export_price }}.\n"
    - conditions:
      - condition: template
        value_template: "{{ (export_price < 0)\n   or (pv_remaining < pv_need)\n   or
          ((soc < export_min_soc) and (pv_remaining < pv_override_kwh))\n   or ev_charging
          }}\n"
      sequence:
      - action: script.set_battery_working_mode
        data:
          power: 0
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ export_price < 0 }}'
          sequence:
          - action: script.huawei_export_limit_w
            data:
              power: 0
          - action: logbook.log
            data:
              name: Energy Manager
              message: 'Morning export STOPPED due to negative export price. PV remaining
                {{ pv_remaining }} kWh, export price {{ export_price }}.

                '
        default:
        - action: logbook.log
          data:
            name: Energy Manager
            message: "Morning export NOT ACTIVE. Reasons may include: PV remaining
              < need ({{ pv_remaining }} < {{ pv_need }}), or both SOC < min and PV
              < override (SOC {{ soc }}% < {{ export_min_soc }}% AND\n PV {{ pv_remaining
              }} kWh < {{ pv_override_kwh }} kWh),\nor EV charging is {{ ev_charging
              }}.\n"
  mode: restart
  variables:
    export_price: '{{ states(''sensor.energidataservice_export'')|float(0) }}'
    pv_remaining: '{{ states(''sensor.solcast_pv_forecast_forecast_remaining_today'')|float(0)
      }}'
    pv_need: '{{ states(''input_number.morning_sell_min_pv_kwh'')|float(8) }}'
    soc: '{{ states(''sensor.batteries_state_of_capacity'')|float(0) }}'
    export_min_soc: '{{ states(''input_number.export_min_soc'')|float(60) }}'
    ev_charging: '{{ is_state(''switch.rugvaenget13_charging'',''on'') }}'
    expensive_now: '{{ is_state(''binary_sensor.energy_expensive_now'',''on'') }}'
    pv_override_kwh: 15
- id: '1760646829606'
  alias: EV - Smart Charging_Migrated
  description: ''
  initial_state: false
  triggers:
  - entity_id: input_boolean.huawei_force_control
    to: 'on'
    trigger: state
  - entity_id:
    - binary_sensor.ev_allowed_time
    - binary_sensor.energy_cheap_now
    - binary_sensor.pv_excess_soon
    - input_boolean.ev_allow_grid
    - input_number.ev_daily_need_kwh
    - sensor.polestar_0796_battery_charge_level
    trigger: state
  - trigger: time_pattern
    minutes: /1
  conditions:
  - condition: state
    entity_id: input_boolean.huawei_force_control
    state: 'on'
  - condition: state
    entity_id: binary_sensor.monta_spangsberg_cable_plugged_in
    state: 'on'
  actions:
  - action: button.press
    metadata: {}
    target:
      entity_id: button.rugvaenget13_authorize_charging
    data: {}
  - variables:
      cheap_now: '{{ is_state(''binary_sensor.energy_cheap_now'',''on'') }}'
      sun_soon: '{{ is_state(''binary_sensor.pv_excess_soon'',''on'') }}'
      allow_grid: '{{ is_state(''input_boolean.ev_allow_grid'',''on'') }}'
      need_kwh: '{{ states(''input_number.ev_daily_need_kwh'')|float(0) }}'
      _v_done: '{{ states(''sensor.ev_energy_today'') }}'
      done_kwh: '{{ (_v_done|float(0)) if _v_done not in [''unknown'',''unavailable'',''none'','''']
        else 0 }}'
      need_left: '{{ [need_kwh - done_kwh, 0] | max }}'
      allowed_time: '{{ is_state(''binary_sensor.ev_allowed_time'',''on'') }}'
      car_soc: '{{ states(''sensor.polestar_0796_battery_charge_level'')|float(0)
        }}'
      battery_soc: '{{ states(''sensor.batteries_state_of_capacity'')|float(0) }}'
      day_target: '{{ states(''input_number.target_soc_day'')|float(95) }}'
      night_target: '{{ states(''input_number.target_soc_night'')|float(10) }}'
      ev_target_soc: '{{ states(''input_number.ev_target_soc'')|float(90) }}'
      battery_operation_in_progress: '{{ is_state(''input_boolean.battery_operation_in_progress'',''on'')
        }}'
      boost_charge: '{{ 7 <= now().hour < 8 and car_soc < ev_target_soc }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ (boost_charge or (((need_left > 0 and allowed_time) or
          (car_soc < ev_target_soc and cheap_now) or (sun_soon and car_soc < ev_target_soc))
          and (battery_soc >= night_target or sun_soon))) and not battery_operation_in_progress
          }}

          '
      sequence:
      - action: script.ev_resume
    - conditions:
      - condition: template
        value_template: "{{ not boost_charge and ((not allowed_time)\n   or (car_soc
          >= ev_target_soc)\n   or (need_left <= 0.1)\n   or battery_operation_in_progress\n
          \  or (battery_soc <= night_target)) }}\n"
      sequence:
      - action: script.ev_pause
  mode: restart
- id: 'ev_full_power_override'
  alias: EV - Full Power Override (Temporary)
  description: 'Temporary: forces charging on at full power, bypassing smart logic. Disable when smart charging is re-enabled.'
  initial_state: false
  triggers:
  - trigger: time_pattern
    minutes: /1
  conditions:
  - condition: state
    entity_id: binary_sensor.monta_spangsberg_cable_plugged_in
    state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: switch.monta_spangsberg_start_stop
      state: 'unavailable'
    - condition: state
      entity_id: switch.monta_spangsberg_start_stop
      state: 'unknown'
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.monta_spangsberg_start_stop
    continue_on_error: true
  - action: number.set_value
    target:
      entity_id: number.batteries_maximum_discharging_power
    data:
      value: 5000
    continue_on_error: true
  mode: single
- id: '1760647384700'
  alias: EV - force charge when PV remaining today > 10 kWh_migrated
  description: Adds detailed debugging to Logbook, system log and notifications
  triggers:
  - trigger: numeric_state
    entity_id: sensor.solcast_pv_forecast_forecast_remaining_today
    above: 10
  conditions:
  - condition: state
    entity_id: input_boolean.huawei_force_control
    state: 'on'
  - condition: state
    entity_id: switch.monta_spangsberg_start_stop
    state: 'off'
  - condition: template
    value_template: "{{ states('switch.monta_spangsberg_start_stop') not in ['unavailable','unknown','none']
      and\n   states('switch.rugvaenget13_charging') not in ['unavailable','unknown','none']
      }}\n"
  actions:
  - action: logbook.log
    data:
      name: EV ForceCharge
      message: 'PRE: pv_remaining={{ states(''sensor.solcast_pv_forecast_forecast_remaining_today'')
        }} force_control={{ states(''input_boolean.huawei_force_control'') }} monta_start_stop={{
        states(''switch.monta_spangsberg_start_stop'') }} charging_switch={{ states(''switch.rugvaenget13_charging'')
        }} attempts={{ states(''counter.ev_start_attempts'') }}'
      entity_id: switch.monta_spangsberg_start_stop
  - action: system_log.write
    data:
      level: info
      logger: automation.ev_force_charge_debug
      message: "[PRE] PV={{ states('sensor.solcast_pv_forecast_forecast_remaining_today')
        }}, force={{ states('input_boolean.huawei_force_control') }}, monta={{ states('switch.monta_spangsberg_start_stop')
        }}, charging={{ states('switch.rugvaenget13_charging') }}, attempts={{ states('counter.ev_start_attempts')
        }}, monta_attrs={{ state_attr('switch.monta_spangsberg_start_stop','friendly_name')
        }} /\n             cp_id={{ state_attr('switch.monta_spangsberg_start_stop','charge_point_id')
        }}"
  - action: switch.turn_on
    target:
      entity_id: switch.monta_spangsberg_start_stop
  - action: logbook.log
    data:
      name: EV ForceCharge
      message: 'POST-CALL: monta_start_stop={{ states(''switch.monta_spangsberg_start_stop'')
        }} charging_switch={{ states(''switch.rugvaenget13_charging'') }}'
      entity_id: switch.monta_spangsberg_start_stop
  - action: system_log.write
    data:
      level: info
      logger: automation.ev_force_charge_debug
      message: '[POST-CALL] monta={{ states(''switch.monta_spangsberg_start_stop'')
        }}, charging={{ states(''switch.rugvaenget13_charging'') }}'
  - wait_template: '{{ is_state(''switch.rugvaenget13_charging'',''on'') }}'
    timeout: 00:00:45
    continue_on_timeout: true
  - action: logbook.log
    data:
      name: EV ForceCharge
      message: 'AFTER-WAIT(45s): charging_switch={{ states(''switch.rugvaenget13_charging'')
        }} monta_start_stop={{ states(''switch.monta_spangsberg_start_stop'') }}'
      entity_id: switch.rugvaenget13_charging
  - action: system_log.write
    data:
      level: info
      logger: automation.ev_force_charge_debug
      message: '[AFTER-WAIT] charging={{ states(''switch.rugvaenget13_charging'')
        }}, monta={{ states(''switch.monta_spangsberg_start_stop'') }}'
  - action: counter.increment
    target:
      entity_id: counter.ev_start_attempts
  - delay: 00:00:10
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ states('counter.ev_start_attempts')|int(0) >= 3\n   and
          is_state('switch.rugvaenget13_charging','off') }}\n"
      sequence:
      - action: logbook.log
        data:
          name: EV ForceCharge
          message: 'FALLBACK: attempts={{ states(''counter.ev_start_attempts'') }},
            charging still OFF -> limiting export & setting battery mode.'
          entity_id: counter.ev_start_attempts
      - action: system_log.write
        data:
          level: warning
          logger: automation.ev_force_charge_debug
          message: '[FALLBACK] attempts={{ states(''counter.ev_start_attempts'') }},
            charging=OFF. Invoking inverter/battery limits.'
      - action: huawei_solar.set_maximum_feed_grid_power
        data:
          device_id: '{{ states(''input_text.huawei_inverter_id'') }}'
          power: 0
      - action: script.set_battery_working_mode
        data:
          power: 0
      - condition: state
        entity_id: input_boolean.energy_debug
        state: 'on'
      - action: persistent_notification.create
        data:
          title: 'EV Force Charge: Fallback engaged'
          message: 'Could not start charging after {{ states(''counter.ev_start_attempts'')
            }} attempts. PV remaining today: {{ states(''sensor.solcast_pv_forecast_forecast_remaining_today'')
            }} kWh. Monta start/stop: {{ states(''switch.monta_spangsberg_start_stop'')
            }}, Charging relay: {{ states(''switch.rugvaenget13_charging'') }}. Inverter
            ID: {{ states(''input_text.huawei_inverter_id'') }}.'
      - action: logbook.log
        data:
          name: Energy Manager
          message: Limited production because EV charger did not start during high
            remaining PV.
  mode: single
- id: '1760648780977'
  alias: EV - reset attempts and clear export limit_migrated
  description: ''
