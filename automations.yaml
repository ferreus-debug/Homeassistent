- id: '1732486673198'
  alias: Optimize Floor Heating by Energy Price and Temperature
  description: Adjust floor heating temperature based on energy price and air temperature.
  triggers:
  - entity_id: sensor.energi_data_service
    trigger: state
  - entity_id: sensor.floor_thermostat_air_temperature
    below: 23
    trigger: numeric_state
  - trigger: time_pattern
    hours: /1
  - entity_id: switch.monta_spangsberg_start_stop
    trigger: state
  conditions: []
  actions:
  - variables:
      cheap_now: '{{ is_state(''binary_sensor.energy_cheap_now'',''on'') }}'
      sun_soon: '{{ is_state(''binary_sensor.pv_excess_soon'',''on'') }}'
      expensive_now: '{{ is_state(''binary_sensor.energy_expensive_now'',''on'') }}'
      silja_room_temp: '{{ states(''sensor.siljasonoff_temperature'') }}'
      maja_room_temp: '{{ states(''sensor.maajatempsonoff_temperature'') }}'
      stue_temp: '{{ states(''sensor.floor_thermostat_air_temperature'')}}'
      kitchen_temp: '{{ states(''sensor.kokkengulvvarme_air_temperature_2'')}}'
  - choose:
    - conditions:
      - condition: state
        entity_id: switch.monta_spangsberg_start_stop
        state: 'on'
      - condition: time
        after: 09:00:00
        before: '16:00:00'
      sequence:
      - target:
          device_id: 0e1f4f7c53dd2c7279efceae52f0dd29
        data:
          hvac_mode: 'off'
          temperature: 23
        action: climate.set_temperature
      - target:
          device_id: ef4b1ce17fe24c7993edc88c3acb74d9
        data:
          hvac_mode: 'off'
          temperature: 22
        action: climate.set_temperature
    - conditions:
      - condition: numeric_state
        entity_id: sensor.dagligstuehumtemp_temperature
        below: 22
      sequence:
      - action: climate.set_temperature
        metadata: {}
        data:
          temperature: 30
          hvac_mode: heat
        target:
          device_id: 0e1f4f7c53dd2c7279efceae52f0dd29
      - action: climate.set_temperature
        metadata: {}
        data:
          hvac_mode: heat
          temperature: 30
        target:
          device_id: ef4b1ce17fe24c7993edc88c3acb74d9
    - conditions:
      - condition: template
        value_template: '{% set hours = state_attr(''sensor.billigste_4_timer_i_dag_unikke_timer'',''hours'')
          or [] %} {{ now().strftime(''%H'') in hours }}'
      sequence:
      - target:
          device_id: 0e1f4f7c53dd2c7279efceae52f0dd29
        data:
          temperature: 25
          hvac_mode: heat
        action: climate.set_temperature
      - target:
          device_id: ef4b1ce17fe24c7993edc88c3acb74d9
        data:
          temperature: 25
          hvac_mode: heat
        action: climate.set_temperature
    - conditions:
      - condition: template
        value_template: '{{ expensive_now }}'
      sequence:
      - target:
          device_id: 0e1f4f7c53dd2c7279efceae52f0dd29
        data:
          temperature: 22
          hvac_mode: heat
        action: climate.set_temperature
      - target:
          device_id: ef4b1ce17fe24c7993edc88c3acb74d9
        data:
          temperature: 20
          hvac_mode: heat
        action: climate.set_temperature
    - conditions:
      - condition: template
        value_template: '{{ cheap_now or stue_temp < 23}}'
      - condition: time
        after: 08:00:00
        before: '20:00:00'
      sequence:
      - target:
          device_id: 0e1f4f7c53dd2c7279efceae52f0dd29
        data:
          temperature: 25
          hvac_mode: heat
        action: climate.set_temperature
      - target:
          device_id: ef4b1ce17fe24c7993edc88c3acb74d9
        data:
          temperature: 25
          hvac_mode: heat
        action: climate.set_temperature
    - conditions:
      - condition: template
        value_template: '{{expensive_now}}'
      sequence:
      - target:
          device_id: 0e1f4f7c53dd2c7279efceae52f0dd29
        data:
          temperature: 18
          hvac_mode: 'off'
        action: climate.set_temperature
      - target:
          device_id: ef4b1ce17fe24c7993edc88c3acb74d9
        data:
          temperature: 18
          hvac_mode: 'off'
        action: climate.set_temperature
    default:
    - action: climate.set_temperature
      metadata: {}
      data:
        temperature: 26
        hvac_mode: heat
      target:
        device_id: 744f253394dafcf728db8d2da5076b68
    - action: climate.set_temperature
      metadata: {}
      target:
        device_id: 0e1f4f7c53dd2c7279efceae52f0dd29
      data:
        temperature: 23
        hvac_mode: heat
    - action: climate.set_temperature
      metadata: {}
      target:
        device_id: ef4b1ce17fe24c7993edc88c3acb74d9
      data:
        temperature: 23
        hvac_mode: heat
  mode: single
