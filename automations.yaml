- id: '1725782126648'
  alias: Set Light Color Based on Power and Energy Sensors
  description: Change light color based on sensor.power_difference and sensor.energi_data_service
    values
  trigger:
  - platform: numeric_state
    entity_id: sensor.power_difference
    above: 2000
    for: 00:05:00
  - platform: numeric_state
    entity_id: sensor.power_difference
    above: 1000
    for: 00:05:00
  - platform: numeric_state
    entity_id: sensor.power_difference
    above: 500
    for: 00:05:00
  - platform: numeric_state
    entity_id: sensor.power_difference
    below: 0
    for: 00:05:00
  - platform: numeric_state
    entity_id: sensor.energi_data_service
    above: 2.4
  - platform: numeric_state
    entity_id: sensor.energi_data_service
    below: 2.4
  - platform: numeric_state
    entity_id: sensor.energi_data_service
    below: 1.5
  condition: []
  action:
  - target:
      device_id: d8259af89a13a6a3ee5e45e4380de34a
    data:
      color_name: "{% set power_diff = states('sensor.power_difference') %} {% set
        energi_service = states('sensor.energi_data_service') %} {% if energi_service
        not in ['unknown', 'unavailable', 'none'] %}\n  {% set energi_service = energi_service
        | float %}\n  {% if energi_service > 2.4 %}\n    red\n  {% elif energi_service
        < 1.5 %}\n    blue\n  {% else %}\n    green\n  {% endif %}\n{% elif power_diff
        not in ['unknown', 'unavailable', 'none'] %}\n  {% set power_diff = power_diff
        | float %}\n  {% if power_diff > 2000 %}\n    blue\n  {% elif power_diff >
        1000 %}\n    yellow\n  {% elif power_diff > 500 %}\n    green\n  {% elif power_diff
        < 0 %}\n    red\n  {% else %}\n    white\n  {% endif %}\n{% else %}\n  white\n{%
        endif %}\n"
    action: light.turn_on
  - data:
      name: Power and Energy Difference Log
      message: 'Power difference is: {{ states(''sensor.power_difference'') }}, Energy
        data service is: {{ states(''sensor.energi_data_service'') }}'
      entity_id: sensor.power_difference
    action: logbook.log
  mode: single
