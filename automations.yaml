- id: '1760779941600'
  alias: EV - Set Max Current from PV Surplus
  description: ''
  triggers:
  - minutes: /1
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: sensor.monta_spangsberg_state
    state:
    - busy-charging
  - condition: template
    value_template: '{{ not (7 <= now().hour < 8) }}'
  actions:
  - data:
      name: EV Charging (debug)
      message: 'Current={{ states(''number.rugvaenget13_charger_max_current'') }}A
        -> Target={{ target_amps | float }}A | PV={{ pv_watts | int }}W | House(raw)={{
        house_watts_raw | int }}W | EV={{ charger_watts | int }}W | House(net)={{
        house_watts | int }}W | Surplus={{ surplus_watts | int }}W | min={{ hard_min_current
        | float }}A max={{ effective_max_current | float }}A boost={{ boost_factor
        }} | BattSOC={{ battery_soc | int }}% BattBoost={{ battery_boost }} | ExportPrice={{
        export_price | round(2) }}DKK

        '
      entity_id: number.rugvaenget13_charger_max_current
    action: logbook.log
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ states('number.rugvaenget13_charger_max_current') | float(-1)\n
          \  != (target_amps | float) and pv_watts > 0 and target_amps | float > 0
          }}\n"
      sequence:
      - target:
          entity_id: number.rugvaenget13_charger_min_current
        data:
          value: '{{ hard_min_current | float(6) }}'
        action: number.set_value
      - target:
          entity_id: number.rugvaenget13_charger_max_current
        data:
          value: '{{ target_amps | float(6) }}'
        action: number.set_value
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ now().hour not in [16, 17] and charger_watts | float(0) > 100 }}'
      sequence:
      - target:
          entity_id: number.batteries_maximum_charging_power
        data:
          value: 500
        action: number.set_value
  - choose:
    - conditions:
      - condition: state
        entity_id: switch.rugvaenget13_charging
        state: 'off'
      sequence:
      - target:
          entity_id: number.batteries_maximum_charging_power
        data:
          value: 5000
        action: number.set_value
  mode: restart
  variables:
    voltage: 230
    phases: >
      {% set i2 = states('sensor.rugvaenget13_current_phase_2') | float(0) %}
      {% set i3 = states('sensor.rugvaenget13_current_phase_3') | float(0) %}
      {{ 3 if (i2 > 0.5 or i3 > 0.5) else 1 }}
    reserve_watts: 300
    base_boost_factor: 2
    negative_export_boost_factor: 2
    battery_soc_entity: sensor.batteries_state_of_capacity
    battery_boost_threshold: 90
    battery_boost_max_current: 16
    export_price: '{{ states(''sensor.energidataservice_export'') | float(0) }}'
    boost_factor: '{{ negative_export_boost_factor if export_price < 0 else base_boost_factor
      }}'
    hard_min_current: '{{ [states(''number.ev_charging_hourly_charger_min_current'')
      | float(6), 6] | max }}'
    hard_max_current: '{{ states(''number.ev_charging_hourly_charger_max_current'')
      | float(16) }}'
    battery_soc: '{{ states(battery_soc_entity) | float(0) }}'
    battery_boost: '{{ (battery_soc | float(0)) >= (battery_boost_threshold | float(90))
      }}'
    effective_max_current: "{% if (battery_soc | float(0)) >= (battery_boost_threshold
      | float(90)) %}\n  {{ battery_boost_max_current | float(16) }}\n{% else %}\n
      \ {{ hard_max_current | float(16) }}\n{% endif %}"
    pv_watts: '{{ states(''sensor.inverter_pv_power'') | float(0) }}'
    house_watts_raw: '{{ states(''sensor.house_consumption_power'') | float(0) }}'
    charger_watts: '{{ states(''sensor.rugvaenget13_charge_power'') | float(0) }}'
    house_watts: '{{ [ (house_watts_raw | float(0) - charger_watts | float(0)), 0
      ] | max }}'
    surplus_watts: '{{ [ (pv_watts | float(0) - house_watts | float(0) - reserve_watts
      | float(0)), 0 ] | max }}'
    amps_calculated: "{% set V = voltage | float(230) %} {% set P = phases | int(1)
      %} {% if V > 0 and P > 0 %}\n  {{ (surplus_watts | float(0)) / (V * P) }}\n{%
      else %}\n  0\n{% endif %}"
    target_amps: "{% set boosted = (amps_calculated | float(0)) * (boost_factor |
      float(1)) %} {% set v = boosted | round(0, 'half_up') | float %} {% set minA
      = hard_min_current | float(6) %} {% set maxA = effective_max_current | float(16)
      %} {% set minA_clamped = [minA, maxA] | min %} {% if v <= 0 %}\n  0\n{% elif
      v < minA_clamped %}\n  {{ minA_clamped }}\n{% elif v > maxA %}\n  {{ maxA }}\n{%
      else %}\n  {{ v }}\n{% endif %}"
- id: 'ev_boost_charge_07_set_max_current'
  alias: EV - Boost charge 07-08 set max current
  description: Every minute during 07:00-08:00, enforce max current 16 A on the charger (surplus script is paused during this window)
  triggers:
  - trigger: time_pattern
    minutes: /1
  conditions:
  - condition: template
    value_template: '{{ 7 <= now().hour < 8 }}'
  - condition: state
    entity_id: binary_sensor.monta_spangsberg_cable_plugged_in
    state: 'on'
  actions:
  - target:
      entity_id: number.rugvaenget13_charger_min_current
    data:
      value: 6
    action: number.set_value
  - target:
      entity_id: number.rugvaenget13_charger_max_current
    data:
      value: 16
    action: number.set_value
  mode: single
