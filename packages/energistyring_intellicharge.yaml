###############################################################################
# Energy Optimization Package - EV, Battery, Export (quiet logs, ASCII only)
# - Dynamic headroom: sensor.max_grid_kw_dynamic
# - Peak shaving with hysteresis and stability window
# - Huawei service payloads (target_soc + device_id + power)
# - Track and log Active Power Control (Unlimited / Limited N W)
# - Periodic log of battery working mode and Active Power Control
###############################################################################

homeassistant:
  customize: {}

sensor:
  - platform: time_date
    display_options:
      - "time"

# --------------------------- HELPERS -----------------------------------------
input_number:
  target_soc_day:
    name: Battery target day (%)
    min: 5
    max: 100
    step: 1
    mode: box
    initial: 95

  target_soc_night:
    name: Battery target night (%)
    min: 0
    max: 100
    step: 1
    mode: box
    initial: 20

  ev_daily_need_kwh:
    name: EV daily need (kWh)
    min: 0
    max: 120
    step: 0.5
    mode: box
    initial: 20

  export_min_soc:
    name: Export min SoC (%)
    min: 0
    max: 100
    step: 1
    mode: box
    initial: 60

  price_threshold_low:
    name: Cheap price threshold (DKK/kWh)
    min: 0.5
    max: 5
    step: 0.05
    mode: box
    initial: 2.0

  price_threshold_high:
    name: Expensive price threshold (DKK/kWh)
    min: 0.5
    max: 5
    step: 0.05
    mode: box
    initial: 2.5

  active_power_limit_w:
    name: Active Power Limit (W)
    min: 0
    max: 50000
    step: 10
    mode: box
    initial: 0

  morning_sell_min_pv_kwh:
    name: Morning sell - min PV remaining today (kWh)
    min: 0
    max: 50
    step: 0.5
    mode: box
    initial: 8

input_boolean:
  ev_allow_grid:
    name: Allow EV charging from grid
    icon: mdi:ev-station
    initial: true

  allow_export:
    name: Allow export during expensive hours
    icon: mdi:transmission-tower-export
    initial: true

  huawei_force_control:
    name: Enable Huawei control (master)
    icon: mdi:battery-sync
    initial: true

  energy_debug:
    name: Energy debug logging
    icon: mdi:bug
    initial: false

  morning_sell_enable:
    name: Morning sell window enable (06-10)
    icon: mdi:white-balance-sunny
    initial: true


input_select:
  energy_scenario:
    name: Energy scenario
    options:
      - Normal
      - Aggressive Peak Shaving
      - Solar-only
      - Cheap Power

  active_power_control_mode:
    name: Active Power Control Mode
    options: ["Unlimited", "Limited"]
    initial: "Unlimited"

input_text:
  huawei_inverter_id:
    name: Huawei Inverter ID
    initial: "a27b89407bbdf3e1b22612e06c361a74"
    max: 64

  huawei_battery_id:
    name: Huawei Battery ID
    initial: "d243aa227d2fbe1ae7cb7900d8523628"
    max: 64

# --------------------------- TEMPLATE SENSORS --------------------------------
template:
  - binary_sensor:
      - name: energy_cheap_now
        state: >
          {% set price = state_attr('sensor.energi_data_service','current_price')|float(999) %}
          {% set cheap = states('input_number.price_threshold_low')|float(2.0) %}
          {{ price < cheap }}

      - name: energy_expensive_now
        state: >
          {% set price = state_attr('sensor.energi_data_service','current_price')|float(0) %}
          {% set expensive = states('input_number.price_threshold_high')|float(2.5) %}
          {{ price > expensive }}

      # EV allowed time window: 00-05 and 09-17
      - name: ev_allowed_time
        state: >
          {% set h = now().hour %}
          {{ (0 <= h < 5) or (9 <= h < 17) }}

  - sensor:
      # Grid import from P1 (W -> kW)
      - name: grid_import_kw
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        state: >
          {% set p1 = states('sensor.p1_meter_power')|float(0) %}
          {{ (p1/1000)|round(3) }}

      # PV next hour (Wh -> kW)
      - name: pv_excess_kw_next_hour
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        state: >
          {% set wh = states('sensor.solcast_pv_forecast_forecast_next_hour')|float(0) %}
          {{ (wh/1000)|round(2) }}

      - name: pv_forecast_remaining_today_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: >
          {{ states('sensor.solcast_pv_forecast_forecast_remaining_today')|float(0) }}

      - name: pv_forecast_tomorrow_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: >
          {{ states('sensor.solcast_pv_forecast_forecast_tomorrow')|float(0) }}

      # Daily import
      - name: grid_import_daily_kwh
        unit_of_measurement: "kWh"
        state_class: total_increasing
        device_class: energy
        state: "{{ states('sensor.power_meter_consumption_energy_daily') }}"
        availability: "{{ states('sensor.power_meter_consumption_energy_daily') not in ['unknown','unavailable','none',''] }}"

      # Dynamic headroom kW = (PV - house)/1000 + buffer, clamped >= 0
      - name: max_grid_kw_dynamic
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        state: >
          {% set pv = states('sensor.inverter_pv_power')|float(0) %}
          {% set house = states('sensor.house_consumption_power')|float(0) %}
          {% set buffer = 1.0 %}
          {% set available = (pv - house) / 1000 %}
          {{ [available + buffer, 0] | max | round(2) }}

      # Friendly text for Active Power Control
      - name: active_power_control_state
        state: >
          {% if is_state('input_select.active_power_control_mode','Limited') %}
            Limited to {{ states('input_number.active_power_limit_w')|int }} W
          {% else %}
            Unlimited
          {% endif %}

  - binary_sensor:
      - name: pv_excess_soon
        state: "{{ states('sensor.pv_excess_kw_next_hour')|float(0) > 2.5 }}"
        attributes:
          threshold_kw: 2.5

# --------------------------- METERS AND COUNTERS -----------------------------
utility_meter:
  ev_energy_today:
    source: sensor.rugvaenget13_session_total_charge
    cycle: daily

counter:
  ev_start_attempts:
    name: EV start attempts on PV
    initial: 0
    step: 1
    restore: false

# --------------------------- SCRIPTS -----------------------------------------
script:
  ev_pause:
    alias: EV - pause charging
    sequence:
      - condition: state
        entity_id: switch.monta_spangsberg_start_stop
        state: "on"
      - service: switch.turn_off
        target:
          entity_id: switch.monta_spangsberg_start_stop
      - service: number.set_value
        target:
          entity_id: number.batteries_maximum_discharging_power
        data:
          value: 5000

  ev_resume:
    alias: EV - start charging
    sequence:
      - condition: state
        entity_id: switch.monta_spangsberg_start_stop
        state: "off"
      - service: switch.turn_on
        target:
          entity_id: switch.monta_spangsberg_start_stop
      - service: number.set_value
        target:
          entity_id: number.batteries_maximum_discharging_power
        data:
          value: 500
  # Maintain helpers for Active Power Control when limiting export
  huawei_export_limit_w:
    alias: Huawei - set export limit W
    mode: restart
    fields:
      power:
        description: Export cap in W (0 blocks export)
    sequence:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
      - service: huawei_solar.set_maximum_feed_grid_power
        data:
          device_id: "{{ states('input_text.huawei_inverter_id') }}"
          power: "{{ power|int }}"
      - service: input_select.select_option
        target: { entity_id: input_select.active_power_control_mode }
        data: { option: "Limited" }
      - service: input_number.set_value
        target: { entity_id: input_number.active_power_limit_w }
        data: { value: "{{ power|int }}" }

  # Maintain helpers for Active Power Control when resetting to unlimited
  huawei_export_unlimited:
    alias: Huawei - export unlimited
    mode: restart
    sequence:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
      - service: huawei_solar.reset_maximum_feed_grid_power
        data:
          device_id: "{{ states('input_text.huawei_inverter_id') }}"
      - service: input_select.select_option
        target: { entity_id: input_select.active_power_control_mode }
        data: { option: "Unlimited" }
      - service: input_number.set_value
        target: { entity_id: input_number.active_power_limit_w }
        data: { value: 0 }

  huawei_force_discharge_to_soc:
    alias: Huawei - force discharge to target SoC
    mode: restart
    sequence:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
      - service: huawei_solar.forcible_discharge
        data:
          device_id: "{{ states('input_text.huawei_battery_id') }}"
          #target_soc: "{{ states('input_number.export_min_soc')|int(60) }}"
          duration: 60
          power: "5000"

  # Parametric charge script (day or night target)
  huawei_force_charge_to_soc:
    alias: Huawei - force charge to target SoC (param)
    mode: restart
    fields:
      target_soc:
        description: Target SoC percent (integer)
        example: 80
    sequence:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
      - service: huawei_solar.forcible_charge_soc
        data:
          device_id: "{{ states('input_text.huawei_battery_id') }}"
          target_soc: "{{ (target_soc | int(80)) }}"
          power: "5000"

  huawei_stop_forced:
    alias: Huawei - stop forced charge or discharge
    mode: restart
    sequence:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
      - service: huawei_solar.stop_forcible_charge
        data:
          device_id: "{{ states('input_text.huawei_battery_id') }}"

  set_battery_working_mode:
    alias: Set battery working mode
    mode: single
    fields:
      power:
        name: Mode parameter
        description: Use 0 for self consumption, any other value for full export
        example: 100
        selector:
          number:
            min: 0
            max: 100
            step: 1
            mode: box
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ power | int > 0 }}"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.batteries_working_mode
                data:
                  option: fully_fed_to_grid
          - conditions:
              - condition: template
                value_template: "{{ power | int == 0 }}"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.batteries_working_mode
                data:
                  option: maximise_self_consumption
        default: []

# --------------------------- AUTOMATIONS -------------------------------------
automation:
  # Scenario helper (quiet)
  - id: auto_scenario_switch
    alias: Auto - Energy Scenario Switching
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.energy_cheap_now
          - binary_sensor.energy_expensive_now
          - binary_sensor.pv_excess_soon
          - sensor.time
    condition:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
    action:
      - variables:
          cheap_now: "{{ is_state('binary_sensor.energy_cheap_now','on') }}"
          expensive_now: "{{ is_state('binary_sensor.energy_expensive_now','on') }}"
          pv_good: "{{ is_state('binary_sensor.pv_excess_soon','on') }}"
          hour: "{{ now().hour }}"
      - choose:
          - conditions: "{{ cheap_now }}"
            sequence:
              - service: input_select.select_option
                target: { entity_id: input_select.energy_scenario }
                data: { option: "Cheap Power" }
          - conditions: "{{ 17 <= hour < 21 and expensive_now }}"
            sequence:
              - service: input_select.select_option
                target: { entity_id: input_select.energy_scenario }
                data: { option: "Aggressive Peak Shaving" }
          - conditions: "{{ pv_good and not cheap_now }}"
            sequence:
              - service: input_select.select_option
                target: { entity_id: input_select.energy_scenario }
                data: { option: "Solar-only" }
          - conditions: []
            sequence:
              - service: input_select.select_option
                target: { entity_id: input_select.energy_scenario }
                data: { option: "Normal" }

  # Peak shaving with template triggers, hysteresis and stability window
  - id: peak_shaving_guard
    alias: Energy - Peak Shaving (Dynamic Headroom)
    mode: restart
    trigger:
      # Over the limit for at least 15s
      - platform: template
        value_template: >
          {{ states('sensor.grid_import_kw')|float(0) >
             states('sensor.max_grid_kw_dynamic')|float(0) }}
        for: "00:00:15"
      # Back under limit (with 0.5 kW hysteresis) for 25s
      - platform: template
        value_template: >
          {{ states('sensor.grid_import_kw')|float(0) <
             (states('sensor.max_grid_kw_dynamic')|float(0) - 0.5) }}
        for: "00:00:25"
    condition:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
    variables:
      grid_kw: "{{ states('sensor.grid_import_kw')|float(0) }}"
      max_kw: "{{ states('sensor.max_grid_kw_dynamic')|float(0) }}"
      ev_charging: "{{ is_state('switch.rugvaenget13_charging','on') }}"
      cheap_now: "{{ is_state('binary_sensor.energy_cheap_now','on') }}"
      allowed_time: "{{ is_state('binary_sensor.ev_allowed_time','on') }}"
    action:
      - choose:
          - conditions: "{{ grid_kw > max_kw }}"
            sequence:
              - choose:
                  - conditions: "{{ ev_charging and cheap_now and allowed_time }}"
                    sequence:
                      - service: script.huawei_stop_forced
                      - service: script.huawei_export_limit_w
                        data: { power: 0 }
                      - delay: "00:00:20"
                      - variables:
                          grid2: "{{ states('sensor.grid_import_kw')|float(0) }}"
                      - choose:
                          - conditions: "{{ grid2 > max_kw }}"
                            sequence:
                              - service: script.ev_pause
                  - conditions: []
                    sequence:
                      - service: script.ev_pause
                      - service: script.huawei_stop_forced
          - conditions: "{{ grid_kw < (max_kw - 0.5) }}"
            sequence: []

  # EV smart charging
  - id: ev_smart_charge
    alias: EV - Smart Charging
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.huawei_force_control
        to: "on"
      - platform: state
        entity_id:
          - binary_sensor.ev_allowed_time
          - binary_sensor.energy_cheap_now
          - binary_sensor.pv_excess_soon
          - input_boolean.ev_allow_grid
          - input_number.ev_daily_need_kwh
          - utility_meter.ev_energy_today
          - sensor.polestar_0796_battery_charge_level
    condition:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
    action:
      - variables:
          cheap_now: "{{ is_state('binary_sensor.energy_cheap_now','on') }}"
          sun_soon: "{{ is_state('binary_sensor.pv_excess_soon','on') }}"
          allow_grid: "{{ is_state('input_boolean.ev_allow_grid','on') }}"
          need_kwh: "{{ states('input_number.ev_daily_need_kwh')|float(0) }}"
          done_kwh: >
            {% set v = states('utility_meter.ev_energy_today') %}
            {{ v|float(0) if v not in ['unknown','unavailable'] else 0 }}
          need_left: "{{ (need_kwh - done_kwh)|max(0) }}"
          allowed_time: "{{ is_state('binary_sensor.ev_allowed_time','on') }}"
          car_soc: "{{ states('sensor.polestar_0796_battery_charge_level')|float(0) }}"
      - choose:
          - conditions: >
              {{ need_left > 0 and allowed_time and car_soc < 50
                 and (sun_soon or (allow_grid and cheap_now)) }}
            sequence:
              - service: script.ev_resume
          - conditions: >
              {{ (not allowed_time) or (car_soc >= 50) or need_left <= 0.1 }}
            sequence:
              - service: script.ev_pause

  # Battery strategy
  - id: battery_strategy
    alias: Battery - targets, peak, export
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.huawei_force_control
        to: "on"
      - platform: state
        entity_id:
          - sensor.batteries_state_of_capacity
          - binary_sensor.energy_cheap_now
          - binary_sensor.energy_expensive_now
          - binary_sensor.pv_excess_soon
          - switch.monta_spangsberg_start_stop
      - platform: template
        value_template: >
          {{ is_state('input_boolean.huawei_force_control','on')
             and states('sensor.time') in ['00:00','06:00','16:00','17:00','21:00'] }}
    condition:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
    action:
      - variables:
          soc: "{{ states('sensor.batteries_state_of_capacity')|float(0) }}"
          cheap_now: "{{ is_state('binary_sensor.energy_cheap_now','on') }}"
          expensive_now: "{{ is_state('binary_sensor.energy_expensive_now','on') }}"
          pv_good: "{{ is_state('binary_sensor.pv_excess_soon','on') }}"
          hour: "{{ now().hour }}"
          day_target: "{{ states('input_number.target_soc_day')|float(95) }}"
          night_target: "{{ states('input_number.target_soc_night')|float(10) }}"
          allow_export: "{{ is_state('input_boolean.allow_export','on') }}"
          export_min_soc: "{{ states('input_number.export_min_soc')|float(60) }}"
          ev_charging: "{{ is_state('switch.rugvaenget13_charging','on') }}"
          export_price: "{{ states('sensor.energidataservice_export')|float(0) }}"
      - choose:
          - conditions: "{{ export_price < 0 }}"
            sequence:
              - service: script.huawei_stop_forced
              - service: script.huawei_export_limit_w
                data: { power: 0 }
              - service: script.set_battery_working_mode
                data: { power: 0 }
              - condition: state
                entity_id: input_boolean.energy_debug
                state: "on"
              - service: logbook.log
                data:
                  name: Energy Manager
                  message: "Export blocked (negative export price)."

          - conditions: "{{ ev_charging }}"
            sequence:
              - service: script.huawei_stop_forced
              - service: script.huawei_export_limit_w
                data: { power: 0 }
              - service: script.set_battery_working_mode
                data: { power: 0 }

          - conditions: "{{ cheap_now and 0 <= hour < 6 and soc < night_target }}"
            sequence:
              - service: script.huawei_stop_forced
              - service: script.huawei_force_charge_to_soc
                data: { target_soc: "{{ night_target | int }}" }
              - service: script.set_battery_working_mode
                data: { power: 0 }

          - conditions: "{{ 6 <= hour < 16 and soc < day_target }}"
            sequence:
              - service: script.huawei_stop_forced
              - service: script.huawei_force_charge_to_soc
                data: { target_soc: "{{ day_target | int }}" }
              - service: script.set_battery_working_mode
                data: { power: 0 }

          - conditions: "{{ 17 <= hour < 21 and not ev_charging and export_price >= 0 }}"
            sequence:
              - service: script.huawei_stop_forced
              - service: script.huawei_export_unlimited
              - service: script.huawei_force_discharge_to_soc
              - service: script.set_battery_working_mode
                data: { power: 100 }

          - conditions: >
              {{ allow_export and expensive_now and soc >= export_min_soc
                 and not ev_charging and pv_good and export_price >= 0 }}
            sequence:
              - service: script.huawei_stop_forced
              - service: script.huawei_export_unlimited
              - service: script.huawei_force_discharge_to_soc
              - service: script.set_battery_working_mode
                data: { power: 100 }

      - service: script.set_battery_working_mode
        data: { power: 0 }

  # Force EV charging when big PV remaining; after 3 failures, limit export to 0 W
  - id: ev_force_charge_when_big_remaining_pv
    alias: EV - force charge when PV remaining today > 10 kWh
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.solcast_pv_forecast_forecast_remaining_today
        above: 10
      - platform: state
        entity_id: switch.monta_spangsberg_start_stop
        to: "off"
    condition:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
      - condition: state
        entity_id: switch.monta_spangsberg_start_stop
        state: "off"
    action:
      - service: switch.turn_on
        target: { entity_id: switch.rugvaenget13_charging }
      - service: counter.increment
        target: { entity_id: counter.ev_start_attempts }
      - delay: "00:00:10"
      - choose:
          - conditions: >
              {{ states('counter.ev_start_attempts')|int(0) >= 3
                 and is_state('switch.rugvaenget13_charging','off') }}
            sequence:
              - service: huawei_solar.set_maximum_feed_grid_power
                data:
                  device_id: "{{ states('input_text.huawei_inverter_id') }}"
                  power: 0
              - service: script.set_battery_working_mode
                data: { power: 0 }
              - condition: state
                entity_id: input_boolean.energy_debug
                state: "on"
              - service: logbook.log
                data:
                  name: Energy Manager
                  message: "Limited production because EV charger did not start during high remaining PV."

  # Reset attempts and clear export limit when EV started, low remaining PV, or at midnight
  - id: ev_force_charge_reset_on_success_or_low_remaining
    alias: EV - reset attempts and clear export limit
    mode: single
    trigger:
      - platform: state
        entity_id: switch.monta_spangsberg_start_stop
        to: "on"
      - platform: numeric_state
        entity_id: sensor.solcast_pv_forecast_forecast_remaining_today
        below: 10
      - platform: time
        at: "00:00:00"
    action:
      - service: counter.reset
        target: { entity_id: counter.ev_start_attempts }
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
      - service: huawei_solar.reset_maximum_feed_grid_power
        data:
          device_id: "{{ states('input_text.huawei_inverter_id') }}"

  # Log Huawei battery working mode every 10 minutes
  - id: log_huawei_working_mode_every_10min
    alias: Energy - Log working mode every 10 min
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/10"
    condition:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
    action:
      - service: logbook.log
        data:
          name: Energy Manager
          message: >-
            Working mode: {{ states('select.batteries_working_mode') }} |
            SoC: {{ states('sensor.batteries_state_of_capacity')|float(0) | round(1) }}% |
            EV charging: {{ is_state('switch.rugvaenget13_charging','on') }} |
            Price: {{ state_attr('sensor.energi_data_service','current_price')|float(0) | round(3) }} DKK/kWh
          entity_id: select.batteries_working_mode

  # Log Active Power Control every 10 minutes
  - id: log_active_power_control_every_10min
    alias: Energy - Log Active Power Control every 10 min
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/10"
    condition:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
    action:
      - service: logbook.log
        data:
          name: Energy Manager
          message: >-
            Active Power Control: {{ states('sensor.active_power_control_state') }} |
            SoC: {{ states('sensor.batteries_state_of_capacity')|float(0)|round(1) }}% |
            EV charging: {{ is_state('switch.rugvaenget13_charging','on') }} |
            Price: {{ state_attr('sensor.energi_data_service','current_price')|float(0)|round(3) }} DKK/kWh
          entity_id: select.batteries_working_mode

  # Also log Active Power Control on change
  - id: log_active_power_control_on_change
    alias: Energy - Log Active Power Control on change
    mode: single
    trigger:
      - platform: state
        entity_id:
          - input_select.active_power_control_mode
          - input_number.active_power_limit_w
    condition:
      - condition: state
        entity_id: input_boolean.huawei_force_control
        state: "on"
    action:
      - service: logbook.log
        data:
          name: Energy Manager
          message: >-
            Active Power Control changed to: {{ states('sensor.active_power_control_state') }}
          entity_id: select.batteries_working_mode

  - id: morning_opportunity_export
    alias: Battery - Morning opportunity export (06-10 if PV remaining is high)
    mode: restart
    trigger:
    # React at window edges and when inputs change
    - platform: time
      at: "06:00:00"
    - platform: time
      at: "10:00:00"
    - platform: time_pattern
      minutes: "/10"
    - platform: state
      entity_id:
        - sensor.solcast_pv_forecast_forecast_remaining_today
        - sensor.energidataservice_export
        - sensor.batteries_state_of_capacity
        - switch.monta_spangsberg_start_stop
        - input_number.morning_sell_min_pv_kwh
        - input_boolean.morning_sell_enable
        - input_boolean.allow_export
        - input_boolean.huawei_force_control
        - input_number.export_min_soc
        - binary_sensor.energy_expensive_now
    condition:
     - condition: state
       entity_id: input_boolean.huawei_force_control
       state: "on"
     - condition: state
       entity_id: input_boolean.morning_sell_enable
       state: "on"
     - condition: state
       entity_id: input_boolean.allow_export
       state: "on"
    variables:
     hour: "{{ now().hour }}"
     in_window: "{{ 6 <= hour < 10 }}"
     export_price: "{{ states('sensor.energidataservice_export')|float(0) }}"
     pv_remaining: "{{ states('sensor.solcast_pv_forecast_forecast_remaining_today')|float(0) }}"
     pv_need: "{{ states('input_number.morning_sell_min_pv_kwh')|float(8) }}"
     soc: "{{ states('sensor.batteries_state_of_capacity')|float(0) }}"
     export_min_soc: "{{ states('input_number.export_min_soc')|float(60) }}"
     ev_charging: "{{ is_state('switch.rugvaenget13_charging','on') }}"
     expensive_now: "{{ is_state('binary_sensor.energy_expensive_now','on') }}"
    action:
     - choose:
         - conditions: >
             {{ in_window
                and export_price >= 0
                and pv_remaining >= pv_need
                and soc >= export_min_soc
                and not ev_charging }}
           sequence:
             - service: script.huawei_stop_forced
             - service: script.huawei_export_unlimited
             - service: script.huawei_force_discharge_to_soc
             - service: script.set_battery_working_mode
               data:
                 power: 100
             - service: logbook.log
               data:
                 name: Energy Manager
                 message: >-
                   Morning export active: exporting down to {{ export_min_soc|int }}%.
                   PV remaining today {{ pv_remaining }} kWh (>= {{ pv_need }} kWh),
                   export price {{ export_price }}.
         - conditions: >
             {{ (not in_window) or (export_price < 0) or (pv_remaining < pv_need)
                or (soc < export_min_soc) or ev_charging }}
           sequence:
             - service: script.huawei_stop_forced
             - service: script.set_battery_working_mode
               data:
                 power: 0
             - choose:
                 - conditions: "{{ export_price < 0 }}"
                   sequence:
                     - service: script.huawei_export_limit_w
                       data:
                         power: 0
                     - service: logbook.log
                       data:
                         name: Energy Manager
                         message: >-
                           Morning export stopped: negative export price or conditions not met.
                           PV remaining {{ pv_remaining }} kWh, export price {{ export_price }}.
               default: []

