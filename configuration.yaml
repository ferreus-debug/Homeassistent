timer:
  poolpumpe_timer:
    duration: "06:00:00"

input_datetime:
  discharge_start_time:
    name: Start afladning
    has_time: true
    has_date: false
    initial: "19:00"
  discharge_end_time:
    name: Stop afladning
    has_time: true
    has_date: false
    initial: "21:00"

input_boolean:
  battery_operation_in_progress:
    name: Battery Operation In Progress
    initial: off
    icon: mdi:lock

input_number:
  ev_target_soc:
    name: EV Target SOC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 90

  min_solar_kwh_for_car_charging:
    name: Min solar kWh for car charging
    min: 10
    max: 50
    step: 1
    unit_of_measurement: "kWh"
    icon: mdi:weather-sunny

  discharge_power_kw:
    name: Afladnings-effekt (watt)
    min: 500
    max: 5000
    step: 100
    unit_of_measurement: W
    icon: mdi:transmission-tower-export

  export_price_threshold:
    name: Minimum pris for eksport (DKK/kWh)
    min: 0
    max: 5
    step: 0.05
    unit_of_measurement: "DKK/kWh"
    icon: mdi:currency-dkk

  export_soc_threshold:
    name: Minimum SOC for eksport (%)
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-high

  charge_price_threshold:
    name: Makspris for import (DKK/kWh)
    min: -2
    max: 4
    step: 0.05
    unit_of_measurement: "DKK/kWh"
    icon: mdi:currency-dkk

  min_remaining_solar_kwh:
    name: Min. sol tilbage for import
    min: 0
    max: 20
    step: 1
    unit_of_measurement: kWh
    icon: mdi:weather-sunny-off

  export_min_solar_kwh:
    name: Min. sol (kWh) for eksport
    min: 0
    max: 20
    step: 1
    unit_of_measurement: kWh
    icon: mdi:weather-sunny

sensor:
  - platform: worxlandroid
    host: 192.168.68.59
    pin: 2312

  - platform: template
    sensors:
      billigste_5_timer:
        friendly_name: "Billigste 5 Timer"
        unique_id: billigste_5_timer
        value_template: "0"
      dyreste_5_timer:
        friendly_name: "Dyreste 5 Timer"
        unique_id: dyreste_5_timer
        value_template: "0"

  - platform: command_line
    name: "Due Todoist Tasks"
    command: "python3 /config/scripts/todoist_latest_tasks.py"
    scan_interval: 3600
    value_template: "{{ value }}"

template:
  - sensor:
      - name: "Billigste 4 timer i dag - unikke timer"
        unique_id: billigste_4_timer_i_dag_unikke_timer
        state: >
          {% set s = state_attr('sensor.energi_data_service','raw_today') or [] %}
          {% set tariffs = state_attr('sensor.energi_data_service','tariffs') or {} %}
          {% set add = (tariffs.get('additional_tariffs',{}).get('transmissions_nettarif',0) | float(0))
                      + (tariffs.get('additional_tariffs',{}).get('systemtarif',0) | float(0))
                      + (tariffs.get('additional_tariffs',{}).get('elafgift',0) | float(0)) %}
          {% set per_hour = tariffs.get('tariffs',{}) %}
          {% set items = s | map(attribute='hour') | list %}
          {% set prices = s | map(attribute='price') | list %}
          {% set n = items | count %}

          {% if n < 4 %}
            unknown
          {% else %}
            {% set ns = namespace(seq=[]) %}
            {% for i in range(n) %}
              {% set dt = items[i] | as_datetime %}
              {% set hour_key = dt.hour | string %}
              {% set hourly_tariff = per_hour.get(hour_key, 0) | float(0) %}
              {% set total = (prices[i] | float(0)) + add + hourly_tariff %}
              {% set ns.seq = ns.seq + [{'dt': dt, 'p': total}] %}
            {% endfor %}
            {% set win = namespace(windows=[]) %}
            {% for i in range(0, n - 3) %}
              {% set window = ns.seq[i:i+4] %}
              {% set ssum = window | map(attribute='p') | sum %}
              {% set win.windows = win.windows + [{'dt': window[0].dt, 'sum': ssum}] %}
            {% endfor %}

            {% if win.windows | count == 0 %}
              unknown
            {% else %}
              {% set sorted = win.windows | sort(attribute='sum') %}

              {# 4. Find op til 4 unikke billigste timer (0-23) #}
              {% set uq = namespace(hours=[]) %}
              {% for w in sorted %}
                {% set h = w.dt.hour %}
                {% if (h not in uq.hours) and (uq.hours | count < 4) %}
                  {% set uq.hours = uq.hours + [h] %}
                {% endif %}
              {% endfor %}

              {% if uq.hours | count == 0 %}
                unknown
              {% else %}
                {{ '%02d' % uq.hours[0] }}
              {% endif %}
            {% endif %}
          {% endif %}
        attributes:
          hours: >
            {% set s = state_attr('sensor.energi_data_service','raw_today') or [] %}
            {% set tariffs = state_attr('sensor.energi_data_service','tariffs') or {} %}
            {% set add = (tariffs.get('additional_tariffs',{}).get('transmissions_nettarif',0) | float(0))
                        + (tariffs.get('additional_tariffs',{}).get('systemtarif',0) | float(0))
                        + (tariffs.get('additional_tariffs',{}).get('elafgift',0) | float(0)) %}
            {% set per_hour = tariffs.get('tariffs',{}) %}
            {% set items = s | map(attribute='hour') | list %}
            {% set prices = s | map(attribute='price') | list %}
            {% set n = items | count %}

            {% if n < 4 %}
              {{ none }}
            {% else %}
              {% set ns = namespace(seq=[]) %}
              {% for i in range(n) %}
                {% set dt = items[i] | as_datetime %}
                {% set hour_key = dt.hour | string %}
                {% set hourly_tariff = per_hour.get(hour_key, 0) | float(0) %}
                {% set total = (prices[i] | float(0)) + add + hourly_tariff %}
                {% set ns.seq = ns.seq + [{'dt': dt, 'p': total}] %}
              {% endfor %}

              {% set win = namespace(windows=[]) %}
              {% for i in range(0, n - 3) %}
                {% set window = ns.seq[i:i+4] %}
                {% set ssum = window | map(attribute='p') | sum %}
                {% set win.windows = win.windows + [{'dt': window[0].dt, 'sum': ssum}] %}
              {% endfor %}

              {% if win.windows | count == 0 %}
                {{ none }}
              {% else %}
                {% set sorted = win.windows | sort(attribute='sum') %}
                {% set uq = namespace(hours=[]) %}
                {% for w in sorted %}
                  {% set h = w.dt.hour %}
                  {% if (h not in uq.hours) and (uq.hours | count < 4) %}
                    {% set uq.hours = uq.hours + [h] %}
                  {% endif %}
                {% endfor %}
                {% if uq.hours | count == 0 %}
                  {{ none }}
                {% else %}
                  [ {% for h in uq.hours %}"{{ '%02d' % h }}"{% if not loop.last %}, {% endif %}{% endfor %} ]
                {% endif %}
              {% endif %}
            {% endif %}
          friendly_name: "Billigste 4 timer i dag (unikke timer)"
          icon: mdi:clock-outline

      - name: "Zaptec Total Charge Power"
        unique_id: zaptec_total_charge_power
        state: >
          {% set v = state_attr('sensor.rugvaenget13_charger','total_charge_power') %}
          {% if v is number %}{{ v|float }}
          {% elif v is string %}{{ v|float(0) }}
          {% else %}unknown{% endif %}
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        availability: >
          {{ state_attr('sensor.rugvaenget13_charger','total_charge_power') is not none }}

      - name: "EV charging net kWh hourly (estimated)"
        unit_of_measurement: "kWh"
        state_class: measurement
        device_class: energy
        state: >
          {% set ev = states('sensor.ev_charging_hourly') | float(0) %}
          {% set imp = states('sensor.p1meterimport_hourly') | float(0) %}
          {% set sol = states('sensor.inverter_hourly_yield') | float(0) %}

          {% set supply = imp + sol %}
          {% set net_share = (imp / supply) if supply > 0 else 1 %}
          {% set ev_net = ev * net_share %}

          {{ ev_net | round(3) }}

      - name: "EV charging cost per hour"
        unit_of_measurement: "DKK"
        state: >
          {% set kwh = states('sensor.ev_charging_hourly') | float(0) %}
          {% set price = states('sensor.energi_data_service') | float(0) %}
          {{ (kwh * price) | round(2) }}

      - name: "EV charging daily cost"
        unit_of_measurement: "DKK"
        state: >
          {% set kwh = states('sensor.ev_charging_daily') | float(0) %}
          {% set price = states('sensor.energi_data_service') | float(0) %}
          {{ (kwh * price) | round(2) }}

      - name: "EV charging weekly cost"
        unit_of_measurement: "DKK"
        state: >
          {% set kwh = states('sensor.ev_charging_weekly') | float(0) %}
          {% set price = states('sensor.energi_data_service') | float(0) %}
          {{ (kwh * price) | round(2) }}

      - name: "EV charging monthly cost"
        unit_of_measurement: "DKK"
        state: >
          {% set kwh = states('sensor.ev_charging_monthly') | float(0) %}
          {% set price = states('sensor.energi_data_service') | float(0) %}
          {{ (kwh * price) | round(2) }}

      - name: "EV charging yearly cost"
        unit_of_measurement: "DKK"
        state: >
          {% set kwh = states('sensor.ev_charging_yearly') | float(0) %}
          {% set price = states('sensor.energi_data_service') | float(0) %}
          {{ (kwh * price) | round(2) }}

      - name: "Polestar Odometer Filtered"
        unit_of_measurement: "km"
        device_class: distance
        state_class: total_increasing
        state: >
          {% set current = states('sensor.polestar_0796_current_odometer') | float(0) %}
          {% set last = states('sensor.polestar_odometer_filtered') | float(0) %}
          {% if current >= last %}
            {{ current }}
          {% else %}
            {{ last }}
          {% endif %}

      - name: "EV netonly weekly - bilopladning (debug)"
        unit_of_measurement: "kWh"
        state: "{{ states('sensor.ev_charging_weekly') }}"

      - name: "EV netonly weekly - net_import (debug)"
        unit_of_measurement: "kWh"
        state: "{{ states('sensor.p1meterimport_weekly') }}"

      - name: "EV netonly weekly - solar (debug)"
        unit_of_measurement: "kWh"
        state: "{{ states('sensor.inverter_weekly_yield') }}"

      - name: "EV charging cost hourly (net only)"
        unit_of_measurement: "DKK"
        state: >
          {% set bilopladning = states('sensor.ev_charging_hourly') | float(0) %}
          {% set net_import = states('sensor.p1meterimport_hourly') | float(0) %}
          {% set frasolar = states('sensor.inverter_hourly_yield') | float(0) %}
          {% set pris_pr_kwh = states('sensor.energi_data_service') | float(0) %}
          {% set estimeret_nettokwh = [bilopladning - frasolar, 0] | max %}
          {% set estimeret_nettokwh = [estimeret_nettokwh, net_import, bilopladning] | min %}
          {{ (estimeret_nettokwh * pris_pr_kwh) | round(2) }}

      - name: "EV charging cost daily (net only)"
        unit_of_measurement: "DKK"
        state: >
          {% set bilopladning = states('sensor.ev_charging_daily') | float(0) %}
          {% set net_import = states('sensor.p1meterimport_daily') | float(0) %}
          {% set frasolar = states('sensor.inverter_daily_yield') | float(0) %}
          {% set pris_pr_kwh = states('sensor.energi_data_service') | float(0) %}
          {% set estimeret_nettokwh = [bilopladning - frasolar, 0] | max %}
          {% set estimeret_nettokwh = [estimeret_nettokwh, net_import, bilopladning] | min %}
          {{ (estimeret_nettokwh * pris_pr_kwh) | round(2) }}

      - name: "EV charging cost weekly (net only)"
        unit_of_measurement: "DKK"
        state: >
          {% set ev = states('sensor.ev_charging_weekly') | float(0) %}
          {% set imp = states('sensor.p1meterimport_weekly') | float(0) %}
          {% set sol = states('sensor.inverter_weekly_yield') | float(0) %}
          {% set pris = states('sensor.energi_data_service') | float(0) %}
          {% set supply = imp + sol %}
          {% set net_share = (imp / supply) if supply > 0 else 1 %}
          {% set ev_net = ev * net_share %}
          {{ (ev_net * pris) | round(2) }}

      - name: "EV charging cost monthly (net only)"
        unit_of_measurement: "DKK"
        state: >
          {% set bilopladning = states('sensor.ev_charging_monthly') | float(0) %}
          {% set net_import = states('sensor.p1meterimport_monthly') | float(0) %}
          {% set frasolar = states('sensor.inverter_monthly_yield') | float(0) %}
          {% set pris_pr_kwh = states('sensor.energi_data_service') | float(0) %}
          {% set estimeret_nettokwh = [bilopladning - frasolar, 0] | max %}
          {% set estimeret_nettokwh = [estimeret_nettokwh, net_import, bilopladning] | min %}
          {{ (estimeret_nettokwh * pris_pr_kwh) | round(2) }}

      - name: "EV charging cost yearly (net only)"
        unit_of_measurement: "DKK"
        state: >
          {% set bilopladning = states('sensor.ev_charging_yearly') | float(0) %}
          {% set net_import = states('sensor.p1meterimport_yearly') | float(0) %}
          {% set frasolar = states('sensor.inverter_yearly_yield') | float(0) %}
          {% set pris_pr_kwh = states('sensor.energi_data_service') | float(0) %}
          {% set estimeret_nettokwh = [bilopladning - frasolar, 0] | max %}
          {% set estimeret_nettokwh = [estimeret_nettokwh, net_import, bilopladning] | min %}
          {{ (estimeret_nettokwh * pris_pr_kwh) | round(2) }}

  - binary_sensor:
      - name: "Should charge car at night"
        unique_id: should_charge_car_night
        state: >
          {% set soc = states('sensor.polestar_0796_battery_charge_level') | float(100) %}
          {{ soc < 75 }}
        icon: mdi:car-electric

      - name: "Should charge car"
        unique_id: should_charge_car_solar_or_cheap
        availability: >
          {{ states('sensor.polestar_0796_battery_charge_level') | is_number and
             states('sensor.solcast_pv_forecast_forecast_remaining_today') | is_number }}
        state: >
          {% set soc = states('sensor.polestar_0796_battery_charge_level') | float(100) %}
          {% set solar = states('sensor.solcast_pv_forecast_forecast_remaining_today') | float(0) %}
          {% set solar_threshold = states('input_number.min_solar_kwh_for_car_charging') | float(2) %}
          {% set hour = now().hour %}
          {{ soc < 90 and (solar > solar_threshold or (hour >= 10 and hour < 17)) }}
        icon: >
          {% if this.state == 'on' %}
            mdi:ev-station
          {% else %}
            mdi:car
          {% endif %}

      - name: "EV paused due battery target"
        state: >
          {{ is_state('input_boolean.battery_operation_in_progress','on')
             or states('sensor.batteries_state_of_capacity')|float(0)
                <= states('input_number.target_soc_night')|float(0) }}
        device_class: safety

      - name: "Skal eksportere fra batteri"
        unique_id: intelligent_batteri_eksport
        availability: >
          {{ states('sensor.batteries_state_of_capacity') | is_number and
             states('sensor.solcast_pv_forecast_forecast_remaining_today') | is_number and
             states('sensor.energidataservice_export') | is_number and
             states('sensor.batteries_rated_capacity') | is_number }}
        state: >
          {% set soc = states('sensor.batteries_state_of_capacity') | float(0) %}
          {% set sol_kwh = states('sensor.solcast_pv_forecast_forecast_remaining_today') | float(0) %}
          {% set pris = states('sensor.energidataservice_export') | float(0) %}
          {% set p_thr = states('input_number.export_price_threshold') | float(0) %}
          {% set soc_thr = states('input_number.export_soc_threshold') | float(0) %}
          {% set cap_kwh = (states('sensor.batteries_rated_capacity') | float(0)) / 1000 %}
          {% set sol_req = states('input_number.export_min_solar_kwh') | float(12) %}
          {% set solar_as_pct = (sol_kwh / cap_kwh * 100) if cap_kwh > 0 else 0 %}
          {% set soc_missing = 100 - soc %}
          {% set cond_soc_vs_sol_ok = soc_missing < solar_as_pct %}
          {{ sol_kwh > sol_req and pris >= p_thr and soc >= soc_thr and cond_soc_vs_sol_ok }}
        attributes:
          soc_percent: "{{ states('sensor.batteries_state_of_capacity') }}"
          sol_kwh_remaining: "{{ states('sensor.solcast_pv_forecast_forecast_remaining_today') }}"
          sol_kwh_req: "{{ states('input_number.export_min_solar_kwh') }}"
          price_dkk_kwh: "{{ states('sensor.energidataservice_export') }}"
          price_threshold: "{{ states('input_number.export_price_threshold') }}"
          soc_threshold: "{{ states('input_number.export_soc_threshold') }}"
          sol_pct_of_battery: >
            {% set cap_kwh = (states('sensor.batteries_rated_capacity')|float(0)) / 1000 %}
            {% set sol_kwh = states('sensor.solcast_pv_forecast_forecast_remaining_today')|float(0) %}
            {{ ((sol_kwh / cap_kwh * 100) if cap_kwh>0 else 0) | round(1) }}
          cond_sol_ok: >
            {{ states('sensor.solcast_pv_forecast_forecast_remaining_today')|float(0) >
               states('input_number.export_min_solar_kwh')|float(12) }}
          cond_price_ok: >
            {{ states('sensor.energidataservice_export')|float(0) >=
               states('input_number.export_price_threshold')|float(0) }}
          cond_soc_ok: >
            {{ states('sensor.batteries_state_of_capacity')|float(0) >=
               states('input_number.export_soc_threshold')|float(0) }}
          cond_soc_vs_sol_ok: "{{ cond_soc_vs_sol_ok }}"
        icon: >
          {% if this.state == 'on' %}
            mdi:battery-export
          {% else %}
            mdi:battery-export-outline
          {% endif %}

      - name: "Skal oplade fra grid"
        unique_id: intelligent_grid_charge
        availability: >
          {{ states('sensor.energi_data_service') | is_number and
             states('sensor.solcast_pv_forecast_forecast_remaining_today') | is_number }}
        state: >
          {% set pris = states('sensor.energi_data_service') | float(10) %}
          {% set p_thr = states('input_number.charge_price_threshold') | float(-0.01) %}
          {% set sol_rest = states('sensor.solcast_pv_forecast_forecast_remaining_today') | float(99) %}
          {% set s_thr = states('input_number.min_remaining_solar_kwh') | float(3) %}
          {% set timen = now().hour %}
          {{ (13 <= timen < 16) and ((pris <= p_thr) or (sol_rest < s_thr)) }}
        icon: >
          {% if this.state == 'on' %}
            mdi:battery-import
          {% else %}
            mdi:battery-outline
          {% endif %}

